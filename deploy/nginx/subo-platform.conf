server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name subo.work www.subo.work 8.138.232.4;

    ssl_certificate /www/server/panel/vhost/cert/subo-platform/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/subo-platform/privkey.pem;

    include /www/server/panel/vhost/nginx/well-known/www.subo.work.conf;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/_acme;
        access_log off;
    }

    location ^~ /api/uploads/ {
        alias /www/wwwroot/uploads/;
        access_log off;
        expires 30d;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3006/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    location ^~ /dashboard/ {
        rewrite ^/dashboard/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:80;
        proxy_set_header Host admin.subo.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /www/wwwlogs/subo.work.log;
    error_log /www/wwwlogs/subo.work.error.log;
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name admin.subo.work;

    ssl_certificate /www/server/panel/vhost/cert/subo-platform/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/subo-platform/privkey.pem;

    root /www/wwwroot/subo-deploy/admin;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/_acme;
        access_log off;
    }

    location ^~ /api/uploads/ {
        alias /www/wwwroot/uploads/;
        access_log off;
        expires 30d;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3006/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/admin.subo.work.log;
    error_log /www/wwwlogs/admin.subo.work.error.log;
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name api.subo.work;

    ssl_certificate /www/server/panel/vhost/cert/subo-platform/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/subo-platform/privkey.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/_acme;
        access_log off;
    }

    location ^~ /api/uploads/ {
        alias /www/wwwroot/uploads/;
        access_log off;
        expires 30d;
    }

    location = / {
        return 302 /api/health;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3006/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /www/wwwlogs/api.subo.work.log;
    error_log /www/wwwlogs/api.subo.work.error.log;
}
