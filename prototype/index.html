<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溯博生物原型总览</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="screen-body">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img class="brand-mark" src="./assets/subo-logo.jpg" alt="溯博生物 logo">
          <div class="brand-copy">
            <div class="brand-title">溯博生物原型总览</div>
            <div class="brand-subtitle">官网、报价中心、后台仪表盘、采购清单</div>
          </div>
        </div>
        <div class="actions">
          <a class="button button-secondary" href="../docs/prd.md">查看 PRD</a>
          <a class="button button-primary" href="./website-home.html">打开首页原型</a>
        </div>
      </div>
    </header>

    <main class="preview-shell">
      <section class="page-head">
        <div class="page-head-grid">
          <div>
            <div class="eyebrow">Prototype Preview</div>
            <h1 class="section-title">先把整体气质和业务流看出来</h1>
            <p class="section-copy">
              这版原型聚焦 4 个关键屏：官网首页、报价中心、后台仪表盘、供应商采购清单。目的是先确认品牌方向、询价承接方式，以及代采业务在后台里的组织方式。
            </p>
          </div>
          <div class="kpi-strip">
            <div class="kpi-chip">
              <strong>4</strong>
              <span>核心屏幕</span>
            </div>
            <div class="kpi-chip">
              <strong>2</strong>
              <span>业务线展示</span>
            </div>
            <div class="kpi-chip">
              <strong>1</strong>
              <span>统一后台入口</span>
            </div>
          </div>
        </div>
      </section>

      <section class="proto-grid">
        <article class="preview-card">
          <div class="preview-head">
            <div>
              <strong>官网首页</strong>
              <div class="admin-meta">品牌展示、技术服务、代采能力、商务联系</div>
            </div>
            <a class="button button-secondary" href="./website-home.html">打开</a>
          </div>
          <div class="preview-frame">
            <iframe src="./website-home.html" title="官网首页原型"></iframe>
          </div>
        </article>

        <article class="preview-card">
          <div class="preview-head">
            <div>
              <strong>报价中心</strong>
              <div class="admin-meta">技术服务报价 + 代采需求提交入口</div>
            </div>
            <a class="button button-secondary" href="./quote-center.html">打开</a>
          </div>
          <div class="preview-frame">
            <iframe src="./quote-center.html" title="报价中心原型"></iframe>
          </div>
        </article>

        <article class="preview-card">
          <div class="preview-head">
            <div>
              <strong>后台仪表盘</strong>
              <div class="admin-meta">询价、订单、代采清单、待办汇总</div>
            </div>
            <a class="button button-secondary" href="./admin-dashboard.html">打开</a>
          </div>
          <div class="preview-frame">
            <iframe src="./admin-dashboard.html" title="后台仪表盘原型"></iframe>
          </div>
        </article>

        <article class="preview-card">
          <div class="preview-head">
            <div>
              <strong>供应商采购清单</strong>
              <div class="admin-meta">保留锐竟/喀斯玛生成清单能力并统一平台管理</div>
            </div>
            <a class="button button-secondary" href="./admin-procurement.html">打开</a>
          </div>
          <div class="preview-frame">
            <iframe src="./admin-procurement.html" title="供应商采购清单原型"></iframe>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
